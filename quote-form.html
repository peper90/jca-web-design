<!DOCTYPE html>
<html lang="en">
<head>

<title>Free Quote | JC&A Web Design</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: url('perfecto2.png') center/cover no-repeat;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;

}

.container{
    background: transparent;
    border: none;
border-radius: 20xp;
    min-height:100vh;
    padding:60px 20px;
}

h1{
    font-size:48px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin-bottom:30px;
}

form{
    max-width:600px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:1xp solid rgba(255,255,255,0.25);
    border-radius:12px;
    font-size:16px;
background: rgba(255,255,255,0.10);

color: white;
}
::placeholder{
    color: rgba(255,255,255,0.75);
}
textarea{
    height:150px;
}

button{
    
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.30);
    padding:15px 35px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    backdrop-filter: blur(10px);

button:hover{
    backgrund: rgba(255,255,255,0.25);
}
</style>
</head>

<div style="text-align:center; padding-top:40px; margin-bottom:30px;">

background:transparent;

">

<div class="container">
    <h1>Request Your Free Quote</h1>
    <p>Tell us about your business and the service you need</p>

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <input type="text" name="business" placeholder="Business Name" required>

        <textarea name="message" placeholder="Tell us about your business and what service you need" required></textarea>
